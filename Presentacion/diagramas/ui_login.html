<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{width:380px;text-align:center;}
.logo{width:72px;height:72px;margin:0 auto 16px;border-radius:50%;background:linear-gradient(135deg,#10b981,#14b8a6);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(16,185,129,.35);font-size:36px;}
h1{color:#fff;font-size:24px;margin-bottom:4px;}
.sub{color:#94a3b8;font-size:14px;margin-bottom:28px;}
.form{background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px;text-align:left;}
label{display:block;color:#cbd5e1;font-size:13px;margin-bottom:6px;font-weight:500;}
.input-wrap{position:relative;margin-bottom:18px;}
.input-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#64748b;font-size:16px;}
input{width:100%;padding:12px 12px 12px 38px;background:rgba(15,23,42,.6);border:1px solid #334155;border-radius:12px;color:#fff;font-size:14px;outline:none;}
input:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.15);}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#10b981,#14b8a6);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(16,185,129,.3);margin-top:6px;}
.footer{color:#475569;font-size:12px;margin-top:20px;}
</style></head><body>
<div class="login-card">
    <div class="logo">💊</div>
    <h1>Farmacia Santa Cruz</h1>
    <p class="sub">Sistema de Inventario</p>
    <div class="form">
        <label>Usuario</label>
        <div class="input-wrap"><span class="icon">👤</span><input type="text" value="stiven.lopez" readonly></div>
        <label>Contraseña</label>
        <div class="input-wrap"><span class="icon">🔒</span><input type="password" value="••••••••" readonly></div>
        <button class="btn">Iniciar Sesión</button>
    </div>
    <p class="footer">San Martín, El Salvador • 2026</p>
</div>
</body></html>
